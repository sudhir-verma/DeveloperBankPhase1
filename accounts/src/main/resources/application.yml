#spring.application.name=accounts
server:
  port: 8080
spring:
  datasource:
    url: jdbc:h2:mem:testdb
    driverClassName: org.h2.Driver
    username: sa
    password: ''
  h2:
    console:
      enabled: true
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: update
    show-sql: true
springdoc:
  swagger-ui:
    # Default is true, but setting explicitly can help debug
    enabled: true
    # This forces the path to be what you expect
    path: /swagger-ui.html
  api-docs:
    enabled: true